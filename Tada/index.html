<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Tada! — a cheerful, minimal to-do list app built with React. Add tasks, mark them done, and stay organised." />
  <title>Tada! · Your cheerful to-do list</title>

  <!-- Favicon (emoji) -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎯</text></svg>" />

  <!-- Stylesheet -->
  <link rel="stylesheet" href="styles.css" />

  <!-- React 18 (development CDN) -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>

  <!-- Babel standalone — transforms JSX in the browser (great for learning, no build step) -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>

  <!-- React mounts here -->
  <div id="root"></div>

  <!-- Our app (type="text/babel" tells Babel standalone to transpile this) -->
  <script type="text/babel" src="app.jsx" data-type="module"></script>

</body>
</html>
