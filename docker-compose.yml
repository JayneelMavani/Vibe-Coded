version: '3.8'
services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
      POSTGRES_DB: phishing_db
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
    environment:
      - DATABASE_URL=postgresql://admin:password@db:5432/phishing_db?schema=public
      - PORT=3000
    ports:
      - '3000:3000'
    depends_on:
      - db
    # In production, you would run prisma migrate deploy. For this dev compose, db push is useful:
    command: sh -c "npx prisma db push && npm start"

  frontend:
    build:
      context: ./frontend
    ports:
      - '80:80'
    depends_on:
      - backend

volumes:
  postgres_data:
